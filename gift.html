<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>선물레이더 — 어떻게 알았지, 싶은 선물</title>
<meta name="theme-color" content="#FFFFFF">
<style>
/* 토스 결 — 라이트, 블루, 라운드 (앱인토스 심사 친화) */
:root{
  --bg:#FFFFFF; --surface:#F7F8FA; --surface-2:#F0F2F5;
  --line:#E8EAED;
  --blue:#3182F6; --blue-ink:#FFFFFF;
  --text:#191F28; --text-2:#4E5968; --muted:#8B95A1;
  --radius:18px; --radius-sm:13px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:var(--bg);color:var(--text);
  font-family:'Pretendard',-apple-system,system-ui,sans-serif;
  line-height:1.6;-webkit-font-smoothing:antialiased}
.wrap{max-width:560px;margin:0 auto;padding:max(20px,env(safe-area-inset-top)) 20px 80px}
.hero{padding:18px 2px 26px}
h1{font-size:26px;font-weight:800;letter-spacing:-.03em;line-height:1.35}
h1 .b{color:var(--blue)}
.sub{font-size:14px;color:var(--text-2);margin-top:8px;line-height:1.65}
.card{background:var(--surface);border-radius:var(--radius);padding:20px 18px;margin-bottom:14px}
label{display:block;font-size:12.5px;font-weight:700;color:var(--muted);margin:16px 0 7px}
label:first-child{margin-top:0}
input{width:100%;background:var(--bg);border:1.5px solid var(--line);
  border-radius:var(--radius-sm);padding:14px;font-size:15px;color:var(--text);
  outline:none;font-family:inherit;transition:border-color .15s}
input:focus{border-color:var(--blue)}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.chip{background:var(--bg);border:1.5px solid var(--line);border-radius:999px;
  padding:8px 14px;font-size:13px;color:var(--text-2);cursor:pointer;font-weight:600}
.chip.on{border-color:var(--blue);color:var(--blue);background:#EBF3FE}
.btn{width:100%;background:var(--blue);color:var(--blue-ink);border:none;
  border-radius:var(--radius-sm);padding:16px;font-size:16px;font-weight:800;
  cursor:pointer;margin-top:20px;font-family:inherit;transition:transform .1s}
.btn:active{transform:scale(.985)}
.btn:disabled{opacity:.45}
.small{font-size:11.5px;color:var(--muted);text-align:center;margin-top:11px}
.angle{font-size:11px;font-weight:800;color:var(--blue);letter-spacing:.06em;margin-bottom:5px}
.reason{font-size:14px;color:var(--text);font-weight:600;line-height:1.6;margin-bottom:13px}
.prod{display:flex;gap:12px;align-items:center;background:var(--bg);border-radius:var(--radius-sm);
  padding:11px;margin-top:8px;text-decoration:none;color:inherit;border:1.5px solid var(--line)}
.prod:active{background:var(--surface-2)}
.prod img{width:58px;height:58px;border-radius:10px;object-fit:cover;background:var(--surface-2);flex:none}
.prod .pn{font-size:13px;color:var(--text);line-height:1.45;font-weight:600;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.prod .pp{font-size:13.5px;font-weight:800;color:var(--blue);margin-top:3px}
.prod .go{margin-left:auto;flex:none;font-size:18px;color:var(--muted)}
.spin{display:inline-block;width:15px;height:15px;border:2.5px solid var(--line);
  border-top-color:var(--blue);border-radius:50%;animation:sp .9s linear infinite;
  vertical-align:-2px;margin-right:8px}
@keyframes sp{to{transform:rotate(360deg)}}
.prog{text-align:center;padding:44px 0;color:var(--text-2);font-size:14px}
.prog .big{font-size:16.5px;font-weight:700;color:var(--text);margin-bottom:8px}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);
  background:var(--text);color:#fff;border-radius:999px;padding:12px 20px;
  font-size:13.5px;font-weight:600;opacity:0;transition:opacity .25s;pointer-events:none;z-index:99}
.toast.show{opacity:1}
.retry{width:100%;background:var(--surface);border:none;color:var(--text-2);
  border-radius:var(--radius-sm);padding:14px;font-size:14px;font-weight:700;
  cursor:pointer;margin-top:8px;font-family:inherit}
.disc{font-size:10.5px;color:var(--muted);text-align:center;margin-top:20px;line-height:1.7}
</style>
</head>
<body>
<div class="wrap">
  <div id="vForm">
    <div class="hero">
      <h1>"어떻게 알았지?"<br>싶은 선물, <span class="b">30초</span>면 찾아요</h1>
      <div class="sub">뻔한 기프티콘 말고요. 받는 사람 얘기를 조금만 해주세요.</div>
    </div>
    <div class="card">
      <label>누구에게 주나요?</label>
      <input id="gWho" placeholder="예: 향수 좋아하는 여자친구" maxlength="30">
      <label>예산은요?</label>
      <div class="chips" id="gBudget">
        <span class="chip" data-v="3만원 이하">~3만원</span>
        <span class="chip on" data-v="3~5만원">3~5만원</span>
        <span class="chip" data-v="5~10만원">5~10만원</span>
        <span class="chip" data-v="10만원 이상">10만원+</span>
      </div>
      <label>취향 힌트 (선택)</label>
      <input id="gTaste" placeholder="예: 미니멀, 커피, 새벽 감성" maxlength="80">
      <button class="btn" id="gGo" onclick="reco()">선물 찾기</button>
      <div class="small">하루 10번까지 무료</div>
    </div>
  </div>

  <div id="vProg" style="display:none">
    <div class="card"><div class="prog">
      <div class="big"><span class="spin"></span>고르는 중</div>
      <div id="pLine">받는 분을 그려보고 있어요</div>
    </div></div>
  </div>

  <div id="vOut" style="display:none"></div>
  <div class="disc">일부 링크는 쿠팡파트너스 활동으로, 구매 시 수수료를 받을 수 있어요.</div>
</div>
<div class="toast" id="toast"></div>

<script>
function esc(s){const d=document.createElement('div');d.textContent=s==null?'':String(s);return d.innerHTML;}
let _tt;
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),2400);}
document.getElementById('gBudget').addEventListener('click',e=>{
  const c=e.target.closest('.chip'); if(!c) return;
  document.querySelectorAll('#gBudget .chip').forEach(x=>x.classList.remove('on'));
  c.classList.add('on');
});

async function reco(){
  const who=(document.getElementById('gWho').value||'').trim();
  const budget=(document.querySelector('#gBudget .chip.on')||{}).dataset?.v||'3~5만원';
  const taste=(document.getElementById('gTaste').value||'').trim();
  if(!who){ toast('받는 사람을 알려주세요'); return; }
  document.getElementById('vForm').style.display='none';
  document.getElementById('vOut').style.display='none';
  document.getElementById('vProg').style.display='';
  const lines=['받는 분을 그려보고 있어요','뻔한 건 거르는 중','계열별로 세 갈래 뽑는 중','실제 상품을 맞춰보는 중'];
  let li=0; const iv=setInterval(()=>{ li=(li+1)%lines.length;
    document.getElementById('pLine').textContent=lines[li]; }, 2600);
  try{
    const r=await fetch('/api/gift/reco',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({who,budget,taste})}).then(x=>x.json());
    clearInterval(iv);
    if(!r.ok){ toast(r.error||'실패'); back(); return; }
    render(r, who, budget);
  }catch(e){ clearInterval(iv); toast('네트워크 오류'); back(); }
}
function back(){
  document.getElementById('vProg').style.display='none';
  document.getElementById('vForm').style.display='';
}
function render(r, who, budget){
  document.getElementById('vProg').style.display='none';
  const v=document.getElementById('vOut'); v.style.display='';
  v.innerHTML=`<div class="hero" style="padding-bottom:16px">
      <h1 style="font-size:21px">${esc(who)}님께,<br><span class="b">${esc(budget)}</span>로 이런 건 어때요</h1>
    </div>`
    +(r.picks||[]).map(p=>{
      const prods=(p.products||[]).map(x=>`
        <a class="prod" href="${esc(x.link||'#')}" target="_blank" rel="noopener">
          ${x.image?`<img src="${esc(x.image)}" loading="lazy" alt="">`:''}
          <div><div class="pn">${esc(x.name||'')}</div>
          ${x.price?`<div class="pp">${Number(x.price).toLocaleString()}원</div>`:''}</div>
          <div class="go">›</div>
        </a>`).join('');
      return `<div class="card">
        <div class="angle">${esc(p.angle||'추천')}</div>
        <div class="reason">${esc(p.reason||'')}</div>
        ${prods||'<div class="small" style="text-align:left">상품을 찾지 못했어요 — 키워드: '+esc(p.keyword)+'</div>'}
      </div>`;
    }).join('')
    +`<button class="btn" onclick="back();document.getElementById('vOut').style.display='none'">다른 사람 선물도 찾기</button>
      <button class="retry" onclick="reco()">같은 조건으로 다시 뽑기</button>`;
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
</body>
</html>
