<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>보임 BOIM — 챗GPT가 당신 상품을 팔아주고 있습니까?</title>
<meta name="description" content="AI 검색 시대, 당신의 스토어가 AI 답변에 등장하는지 무료로 진단합니다.">
<style>
:root{
  --bg:#0c0c0e; --surface:#151518; --surface-2:#1c1c20; --line:#2a2a30;
  --text:#f2f0ec; --text-2:#b8b4ac; --muted:#77736b;
  --mint:#8fd4b8; --warn:#e2a08c; --gold:#d4b88f;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Pretendard',-apple-system,system-ui,sans-serif;
  line-height:1.6;-webkit-font-smoothing:antialiased}
.wrap{max-width:560px;margin:0 auto;padding:28px 20px 80px}
.logo{font-size:13px;font-weight:800;letter-spacing:.22em;color:var(--muted);margin-bottom:40px}
.logo b{color:var(--mint)}
h1{font-size:29px;font-weight:800;letter-spacing:-.02em;line-height:1.32;margin-bottom:14px}
h1 .q{color:var(--mint)}
.sub{font-size:14.5px;color:var(--text-2);line-height:1.7;margin-bottom:34px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:22px 20px;margin-bottom:16px}
label{display:block;font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.06em;margin:14px 0 7px}
input{width:100%;background:var(--surface-2);border:1px solid var(--line);border-radius:12px;
  padding:13px 14px;font-size:15px;color:var(--text);outline:none}
input:focus{border-color:var(--mint)}
.hint{font-size:11px;color:var(--muted);margin-top:5px}
.btn{width:100%;background:var(--text);color:var(--bg);border:none;border-radius:14px;
  padding:16px;font-size:16px;font-weight:800;cursor:pointer;margin-top:20px;letter-spacing:-.01em}
.btn:disabled{opacity:.45}
.small{font-size:11px;color:var(--muted);text-align:center;margin-top:12px}
/* 리포트 */
.grade-wrap{text-align:center;padding:16px 0 8px}
.grade{font-size:88px;font-weight:900;line-height:1}
.g-F{color:var(--warn)} .g-D{color:var(--warn)} .g-C{color:var(--gold)}
.g-B{color:var(--mint)} .g-A{color:var(--mint)}
.score-line{font-size:13px;color:var(--muted);margin-top:6px}
.verdict{font-size:16.5px;font-weight:700;line-height:1.6;text-align:center;padding:14px 6px 4px}
.sec-t{font-size:12px;font-weight:800;letter-spacing:.14em;color:var(--muted);margin:26px 0 10px}
.qrow{display:flex;align-items:flex-start;gap:10px;padding:11px 0;border-bottom:1px solid var(--line)}
.qrow:last-child{border-bottom:none}
.qmark{flex:none;font-size:15px;margin-top:1px}
.qtext{font-size:13.5px;color:var(--text-2)}
.comp{display:inline-block;background:var(--surface-2);border:1px solid var(--line);
  border-radius:999px;padding:7px 13px;font-size:12.5px;color:var(--text-2);margin:0 6px 8px 0}
.comp b{color:var(--text)}
.cta{background:linear-gradient(145deg,#17211d,#141518);border:1px solid #2b4a37;border-radius:18px;
  padding:22px 20px;margin-top:26px}
.cta .t{font-size:17px;font-weight:800;margin-bottom:8px}
.cta .s{font-size:13px;color:var(--text-2);line-height:1.7;margin-bottom:14px}
.cta .btn{margin-top:4px;background:var(--mint);color:#0c1512}
.share{width:100%;background:transparent;border:1px solid var(--line);color:var(--text-2);
  border-radius:12px;padding:13px;font-size:13px;cursor:pointer;margin-top:10px}
.spin{display:inline-block;width:15px;height:15px;border:2px solid var(--line);
  border-top-color:var(--mint);border-radius:50%;animation:sp 1s linear infinite;vertical-align:-3px;margin-right:8px}
@keyframes sp{to{transform:rotate(360deg)}}
.prog{text-align:center;padding:38px 0;color:var(--text-2);font-size:14px}
.prog .big{font-size:17px;font-weight:700;color:var(--text);margin-bottom:10px}
.footer{margin-top:44px;font-size:11px;color:var(--muted);text-align:center;line-height:1.8}
.footer a{color:var(--text-2)}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">보임 <b>BOIM</b> · AI 검색 노출 진단</div>

  <!-- 입력 화면 -->
  <div id="viewForm">
    <h1>챗GPT가 당신 상품을<br><span class="q">팔아주고 있습니까?</span></h1>
    <div class="sub">
      사람들은 이제 검색창 대신 AI에게 "뭐 살까"를 묻습니다.<br>
      그 답변에 <b>당신 스토어가 등장하는지</b>, 실제 AI에게 물어봐서 확인해드립니다. 무료입니다.
    </div>
    <div class="card">
      <label>스토어 이름</label>
      <input id="fStore" placeholder="예: 고코스모스" maxlength="40">
      <div class="hint">네이버 스마트스토어·쿠팡·자사몰 모두 가능</div>
      <label>다른 표기 (선택)</label>
      <input id="fAlias" placeholder="예: gocosmos (영문명·별칭)" maxlength="60">
      <label>업종 키워드 (쉼표로 1~3개)</label>
      <input id="fKw" placeholder="예: 니치 향수, 남자 향수" maxlength="70">
      <div class="hint">손님이 AI에게 물어볼 법한 상품 카테고리</div>
      <button class="btn" id="goBtn" onclick="startScan()">무료 진단 시작</button>
      <div class="small">약 30초~1분 · 회원가입 없음 · 하루 3회</div>
    </div>
  </div>

  <!-- 진행 화면 -->
  <div id="viewProg" style="display:none">
    <div class="card">
      <div class="prog">
        <div class="big"><span class="spin"></span>AI들에게 물어보는 중…</div>
        <div id="progLine">쇼핑 질문을 던지고 답변을 수집하고 있어요</div>
      </div>
    </div>
  </div>

  <!-- 리포트 화면 -->
  <div id="viewReport" style="display:none"></div>

  <div class="footer">
    보임 BOIM — AI 검색 시대의 노출 진단<br>
    <a href="/boim">새 진단하기</a>
  </div>
</div>

<script>
function esc(s){const d=document.createElement('div');d.textContent=s==null?'':String(s);return d.innerHTML;}

async function startScan(){
  const store=(document.getElementById('fStore').value||'').trim();
  const alias=(document.getElementById('fAlias').value||'').trim();
  const kws=(document.getElementById('fKw').value||'').split(',').map(s=>s.trim()).filter(Boolean);
  if(!store){ alert('스토어 이름을 넣어주세요'); return; }
  if(!kws.length){ alert('업종 키워드를 1개 이상 넣어주세요'); return; }
  const btn=document.getElementById('goBtn'); btn.disabled=true; btn.textContent='시작하는 중…';
  try{
    const r=await fetch('/api/boim/scan',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({store, keywords:kws, aliases: alias?[alias]:[]})}).then(x=>x.json());
    if(!r.ok){ alert(r.error||'실패'); btn.disabled=false; btn.textContent='무료 진단 시작'; return; }
    history.pushState({},'','/boim/r/'+r.scan_id);
    showProg(); poll(r.scan_id);
  }catch(e){ alert('네트워크 오류'); btn.disabled=false; btn.textContent='무료 진단 시작'; }
}

function showProg(){
  document.getElementById('viewForm').style.display='none';
  document.getElementById('viewReport').style.display='none';
  document.getElementById('viewProg').style.display='';
}

let pollN=0;
async function poll(id){
  pollN++;
  try{
    const d=await fetch('/api/boim/scan/'+id).then(x=>x.json());
    if(d.status==='done' && d.result){ render(d); return; }
    if(d.status==='error'){ document.getElementById('progLine').textContent='진단에 실패했어요: '+(d.error||''); return; }
    const msgs=['쇼핑 질문을 던지고 답변을 수집하고 있어요','답변에서 스토어 언급을 찾는 중…','경쟁 스토어를 파악하는 중…','거의 다 됐어요'];
    document.getElementById('progLine').textContent=msgs[Math.min(Math.floor(pollN/3),msgs.length-1)];
  }catch(e){}
  setTimeout(()=>poll(id), 2500);
}

function render(d){
  const r=d.result;
  document.getElementById('viewForm').style.display='none';
  document.getElementById('viewProg').style.display='none';
  const v=document.getElementById('viewReport'); v.style.display='';
  const mentionRows=(r.results||[]).filter(x=>x.ok).map(x=>`
    <div class="qrow">
      <div class="qmark">${x.mentioned?'✅':'❌'}</div>
      <div class="qtext">"${esc(x.query)}"</div>
    </div>`).join('');
  const comps=(r.competitors||[]).map(c=>`<span class="comp"><b>${esc(c.name)}</b> ${c.count}회</span>`).join('');
  v.innerHTML=`
    <h1 style="font-size:22px">"${esc(r.store)}" AI 노출 진단</h1>
    <div class="card">
      <div class="grade-wrap">
        <div class="grade g-${esc(r.grade)}">${esc(r.grade)}</div>
        <div class="score-line">쇼핑 질문 ${r.asked}개 중 <b>${r.mentioned}개</b>에서 언급 · 노출 점수 ${r.score}점</div>
      </div>
      <div class="verdict">${esc(r.verdict)}</div>
    </div>
    <div class="sec-t">질문별 결과</div>
    <div class="card">${mentionRows||'<div class="qtext">응답을 받지 못했어요</div>'}</div>
    ${comps?`<div class="sec-t">AI가 대신 언급한 이름들</div><div class="card">${comps}
      <div class="hint" style="margin-top:6px">AI 답변에 2회 이상 등장한 브랜드·스토어 후보</div></div>`:''}
    <div class="cta">
      <div class="t">이 성적, 바꿀 수 있습니다</div>
      <div class="s">AI는 <b>구조화된 정보</b>(FAQ·정확한 상품 설명·일관된 브랜드명)를 가진 스토어를 인용합니다.
        보임은 매주 노출을 추적하고, 상품 FAQ를 자동 생성·주입해 AI가 읽기 좋은 스토어로 만들어드립니다.</div>
      <button class="btn" onclick="waitlist()">출시 알림 받기 (준비 중)</button>
    </div>
    <button class="share" onclick="shareReport()">📋 이 리포트 링크 복사</button>`;
}

function shareReport(){
  navigator.clipboard.writeText(location.href).then(()=>alert('링크가 복사됐어요'));
}
function waitlist(){
  const em=prompt('출시되면 알려드릴게요. 이메일을 남겨주세요:');
  if(em && em.includes('@')){
    fetch('/api/boim/waitlist',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:em})}).catch(()=>{});
    alert('감사합니다! 곧 만나요.');
  }
}

// /boim/r/<id> 로 직접 들어온 경우
const m=location.pathname.match(/\/boim\/r\/([a-z0-9]+)/);
if(m){ showProg(); poll(m[1]); }
</script>
</body>
</html>
