<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>보임 BOIM — 챗GPT가 당신 상품을 팔아주고 있습니까?</title>
<meta name="description" content="AI 검색 시대, 당신의 스토어가 AI 답변에 등장하는지 무료로 진단합니다.">
<meta name="theme-color" content="#0A0A0B">
<link rel="manifest" href="/boim-manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="보임">
<link rel="apple-touch-icon" href="/boim-icon-192.png">
<style>
:root{
  --bg:#0A0A0B; --surface-1:#131315; --surface-2:#191A1C; --surface-3:#232427;
  --line:#2A2B2E; --line-soft:#1F2023;
  --mint:#F2F2F3; --mint-bright:#FFFFFF; --mint-ink:#0A0A0B;
  --text:#F2F2F3; --text-2:#9B9CA1; --muted:#6A6B70;
  --warn-tx:#C9B071; --err-tx:#D98A8A; --ok-tx:#EAEAEB;
  --radius:16px; --radius-sm:12px;
  --shadow:0 6px 28px rgba(0,0,0,.5);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:var(--bg);color:var(--text);
  font-family:'Pretendard',-apple-system,system-ui,sans-serif;
  line-height:1.6;-webkit-font-smoothing:antialiased}
.wrap{max-width:560px;margin:0 auto;padding:max(24px,env(safe-area-inset-top)) 20px 90px}
.logo{display:flex;align-items:center;gap:9px;margin-bottom:38px}
.logo .mark{width:26px;height:26px;border:1.5px solid var(--text);border-radius:8px;
  display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900}
.logo .nm{font-size:12px;font-weight:800;letter-spacing:.22em;color:var(--text-2)}
.logo .nm b{color:var(--text)}
h1{font-size:28px;font-weight:800;letter-spacing:-.025em;line-height:1.3;margin-bottom:14px}
h1 .q{border-bottom:2px solid var(--text)}
.sub{font-size:14px;color:var(--text-2);line-height:1.75;margin-bottom:30px}
.sub b{color:var(--text)}
.card{background:var(--surface-1);border:1px solid var(--line);border-radius:var(--radius);
  padding:22px 20px;margin-bottom:14px;box-shadow:var(--shadow)}
label{display:block;font-size:11.5px;font-weight:700;color:var(--muted);
  letter-spacing:.08em;margin:16px 0 7px}
label:first-child{margin-top:0}
input{width:100%;background:var(--surface-2);border:1.5px solid var(--line);
  border-radius:var(--radius-sm);padding:13px 14px;font-size:15px;color:var(--text);
  outline:none;font-family:inherit;transition:border-color .18s}
input:focus{border-color:var(--text-2)}
.hint{font-size:11px;color:var(--muted);margin-top:6px}
.btn{width:100%;background:var(--mint);color:var(--mint-ink);border:none;
  border-radius:var(--radius-sm);padding:15px;font-size:15px;font-weight:800;
  cursor:pointer;margin-top:20px;font-family:inherit;letter-spacing:-.01em;
  transition:transform .1s}
.btn:active{transform:scale(.985)}
.btn:disabled{opacity:.4}
.btn.ghost{background:transparent;border:1.5px solid var(--line);color:var(--text-2);font-weight:600}
.small{font-size:11px;color:var(--muted);text-align:center;margin-top:12px;letter-spacing:.01em}
.grade-wrap{text-align:center;padding:18px 0 6px}
.grade{font-size:92px;font-weight:900;line-height:1;letter-spacing:-.04em}
.g-F,.g-D{color:var(--err-tx)} .g-C{color:var(--warn-tx)} .g-B,.g-A{color:var(--text)}
.score-line{font-size:12.5px;color:var(--muted);margin-top:10px}
.score-line b{color:var(--text-2)}
.verdict{font-size:16px;font-weight:700;line-height:1.65;text-align:center;
  padding:16px 8px 6px;letter-spacing:-.01em}
.sec-t{font-size:11px;font-weight:800;letter-spacing:.16em;color:var(--muted);margin:26px 4px 10px}
.qrow{display:flex;align-items:flex-start;gap:11px;padding:12px 0;border-bottom:1px solid var(--line-soft)}
.qrow:last-child{border-bottom:none}
.qmark{flex:none;width:20px;height:20px;border-radius:6px;display:flex;align-items:center;
  justify-content:center;font-size:11px;font-weight:800;margin-top:1px}
.qmark.hit{background:var(--text);color:var(--bg)}
.qmark.miss{background:var(--surface-3);color:var(--muted)}
.qtext{font-size:13.5px;color:var(--text-2)}
.comp{display:inline-flex;align-items:center;gap:6px;background:var(--surface-2);
  border:1px solid var(--line);border-radius:999px;padding:7px 13px;font-size:12.5px;
  color:var(--text-2);margin:0 6px 8px 0}
.comp b{color:var(--text);font-weight:700}
.comp .n{font-size:10.5px;color:var(--muted)}
.cta{background:var(--surface-1);border:1.5px solid var(--text-2);border-radius:var(--radius);
  padding:22px 20px;margin-top:24px;box-shadow:var(--shadow)}
.cta .t{font-size:17px;font-weight:800;margin-bottom:9px;letter-spacing:-.02em}
.cta .s{font-size:13px;color:var(--text-2);line-height:1.7;margin-bottom:6px}
.cta .s b{color:var(--text)}
.plan{display:flex;align-items:center;justify-content:space-between;gap:10px;
  background:var(--surface-2);border:1.5px solid var(--line);border-radius:var(--radius-sm);
  padding:14px 15px;margin-top:10px;cursor:pointer;transition:border-color .15s}
.plan.on{border-color:var(--text)}
.plan .pl{font-size:14px;font-weight:700}
.plan .pd{font-size:11.5px;color:var(--muted);margin-top:2px;line-height:1.5}
.plan .pp{font-size:15px;font-weight:800;white-space:nowrap}
.plan .pp span{font-size:11px;color:var(--muted);font-weight:600}
.share{width:100%;background:transparent;border:1.5px solid var(--line);color:var(--text-2);
  border-radius:var(--radius-sm);padding:13px;font-size:13px;font-weight:600;cursor:pointer;
  margin-top:10px;font-family:inherit}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--line);
  border-top-color:var(--text);border-radius:50%;animation:sp 1s linear infinite;
  vertical-align:-2px;margin-right:8px}
@keyframes sp{to{transform:rotate(360deg)}}
.prog{text-align:center;padding:40px 0;color:var(--text-2);font-size:13.5px}
.prog .big{font-size:16px;font-weight:700;color:var(--text);margin-bottom:10px}
.footer{margin-top:44px;font-size:11px;color:var(--muted);text-align:center;line-height:1.9}
.footer a{color:var(--text-2);text-decoration:none;border-bottom:1px solid var(--line)}
.msg-err{background:#231618;border:1px solid #3E2429;color:var(--err-tx);
  border-radius:var(--radius-sm);padding:12px 14px;font-size:12.5px;margin-top:12px;line-height:1.6}
.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);
  background:var(--surface-3);border:1px solid var(--line);color:var(--text);
  border-radius:999px;padding:11px 20px;font-size:13px;font-weight:600;
  box-shadow:var(--shadow);opacity:0;transition:opacity .25s;pointer-events:none;z-index:99}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo"><div class="mark">B</div><div class="nm">보임 <b>BOIM</b> · AI 검색 노출 진단</div></div>

  <div id="viewForm">
    <h1>챗GPT가 당신 상품을<br><span class="q">팔아주고 있습니까?</span></h1>
    <div class="sub">
      사람들은 이제 검색창 대신 AI에게 "뭐 살까"를 묻습니다.<br>
      그 답변에 <b>당신 스토어가 등장하는지</b>, 실제 AI에게 물어봐서 확인해드립니다. 무료입니다.
    </div>
    <div class="card">
      <label>스토어 이름</label>
      <input id="fStore" placeholder="예: 고코스모스" maxlength="40">
      <div class="hint">네이버 스마트스토어 · 쿠팡 · 자사몰 모두 가능</div>
      <label>다른 표기 (선택)</label>
      <input id="fAlias" placeholder="예: gocosmos (영문명·별칭)" maxlength="60">
      <label>업종 키워드 (쉼표로 1~3개)</label>
      <input id="fKw" placeholder="예: 니치 향수, 남자 향수" maxlength="70">
      <div class="hint">손님이 AI에게 물어볼 법한 상품 카테고리</div>
      <button class="btn" id="goBtn" onclick="startScan()">무료 진단 시작</button>
      <div class="small">약 30초~1분 · 회원가입 없음 · 하루 3회</div>
      <div id="formErr"></div>
    </div>
  </div>

  <div id="viewProg" style="display:none">
    <div class="card">
      <div class="prog">
        <div class="big"><span class="spin"></span>AI들에게 물어보는 중</div>
        <div id="progLine">쇼핑 질문을 던지고 답변을 수집하고 있어요</div>
      </div>
    </div>
  </div>

  <div id="viewReport" style="display:none"></div>

  <div class="footer">
    보임 BOIM — AI 검색 시대의 노출 진단<br>
    <a href="/boim">새 진단하기</a>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
function esc(s){const d=document.createElement('div');d.textContent=s==null?'':String(s);return d.innerHTML;}
let _tt;
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),2400);}

async function startScan(){
  const store=(document.getElementById('fStore').value||'').trim();
  const alias=(document.getElementById('fAlias').value||'').trim();
  const kws=(document.getElementById('fKw').value||'').split(',').map(s=>s.trim()).filter(Boolean);
  const errBox=document.getElementById('formErr'); errBox.innerHTML='';
  if(!store){ toast('스토어 이름을 넣어주세요'); return; }
  if(!kws.length){ toast('업종 키워드를 1개 이상 넣어주세요'); return; }
  const btn=document.getElementById('goBtn'); btn.disabled=true; btn.textContent='시작하는 중…';
  try{
    const r=await fetch('/api/boim/scan',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({store, keywords:kws, aliases: alias?[alias]:[]})}).then(x=>x.json());
    if(!r.ok){
      errBox.innerHTML='<div class="msg-err">'+esc(r.error||'실패')+'</div>';
      btn.disabled=false; btn.textContent='무료 진단 시작'; return;
    }
    history.pushState({},'','/boim/r/'+r.scan_id);
    showProg(); poll(r.scan_id);
  }catch(e){ toast('네트워크 오류'); btn.disabled=false; btn.textContent='무료 진단 시작'; }
}

function showProg(){
  document.getElementById('viewForm').style.display='none';
  document.getElementById('viewReport').style.display='none';
  document.getElementById('viewProg').style.display='';
}

let pollN=0;
async function poll(id){
  pollN++;
  try{
    const d=await fetch('/api/boim/scan/'+id).then(x=>x.json());
    if(d.status==='done' && d.result){ render(d); return; }
    if(d.status==='error'){ document.getElementById('progLine').textContent='진단 실패: '+(d.error||''); return; }
    const msgs=['쇼핑 질문을 던지고 답변을 수집하고 있어요','답변에서 스토어 언급을 찾는 중','경쟁 스토어를 파악하는 중','거의 다 됐어요'];
    document.getElementById('progLine').textContent=msgs[Math.min(Math.floor(pollN/3),msgs.length-1)];
  }catch(e){}
  setTimeout(()=>poll(id), 2500);
}

function render(d){
  const r=d.result;
  document.getElementById('viewForm').style.display='none';
  document.getElementById('viewProg').style.display='none';
  const v=document.getElementById('viewReport'); v.style.display='';
  const rows=(r.results||[]).filter(x=>x.ok).map(x=>`
    <div class="qrow">
      <div class="qmark ${x.mentioned?'hit':'miss'}">${x.mentioned?'✓':'—'}</div>
      <div class="qtext">"${esc(x.query)}"</div>
    </div>`).join('');
  const comps=(r.competitors||[]).map(c=>`<span class="comp"><b>${esc(c.name)}</b><span class="n">${c.count}회</span></span>`).join('');
  v.innerHTML=`
    <h1 style="font-size:21px">"${esc(r.store)}"<br>AI 노출 진단 결과</h1>
    <div class="card">
      <div class="grade-wrap">
        <div class="grade g-${esc(r.grade)}">${esc(r.grade)}</div>
        <div class="score-line">쇼핑 질문 <b>${r.asked}개</b> 중 <b>${r.mentioned}개</b> 언급 · 노출 점수 <b>${r.score}</b></div>
      </div>
      <div class="verdict">${esc(r.verdict)}</div>
    </div>
    <div class="sec-t">질문별 결과</div>
    <div class="card">${rows||'<div class="qtext">응답을 받지 못했어요</div>'}</div>
    ${comps?`<div class="sec-t">AI가 대신 언급한 이름들</div>
      <div class="card">${comps}
      <div class="hint" style="margin-top:4px">AI 답변에 2회 이상 등장한 브랜드·스토어 후보</div></div>`:''}
    <div class="cta">
      <div class="t">이 성적, 바꿀 수 있습니다</div>
      <div class="s">AI는 <b>구조화된 정보</b>(FAQ · 정확한 상품 설명 · 일관된 브랜드명)를 가진 스토어를 인용합니다.
        보임이 매주 노출을 추적하고, AI가 읽기 좋은 스토어로 만들어드립니다.</div>
      <div class="plan on" data-plan="watch" onclick="pickPlan(this)">
        <div><div class="pl">보임 워치</div><div class="pd">주간 AI 노출 추적 · 순위 변화 알림</div></div>
        <div class="pp">9,900<span>원/30일</span></div>
      </div>
      <div class="plan" data-plan="boost" onclick="pickPlan(this)">
        <div><div class="pl">보임 부스트</div><div class="pd">워치 + FAQ 자동 생성·주입 · 월간 리포트</div></div>
        <div class="pp">29,900<span>원/30일</span></div>
      </div>
      <button class="btn" onclick="checkout()">이용권 결제하기</button>
      <div class="small">토스페이먼츠 안전결제 · 30일 이용권 (자동갱신 없음)</div>
    </div>
    <button class="share" onclick="shareReport()">리포트 링크 복사</button>`;
}

let _plan='watch';
function pickPlan(el){
  document.querySelectorAll('.plan').forEach(p=>p.classList.remove('on'));
  el.classList.add('on'); _plan=el.dataset.plan;
}

async function checkout(){
  try{
    const cfg=await fetch('/api/boim/pay/config').then(x=>x.json());
    if(!cfg.ok){ toast(cfg.error||'결제 준비 중이에요. 곧 열립니다!'); return; }
    const m=location.pathname.match(/\/boim\/r\/([a-z0-9]+)/);
    const scanId=m?m[1]:'direct';
    const amount=_plan==='boost'?29900:9900;
    const orderName=_plan==='boost'?'보임 부스트 30일':'보임 워치 30일';
    if(!window.TossPayments){
      await new Promise((res,rej)=>{const s=document.createElement('script');
        s.src='https://js.tosspayments.com/v1/payment';s.onload=res;s.onerror=rej;document.head.appendChild(s);});
    }
    const toss=TossPayments(cfg.client_key);
    const orderId='boim_'+_plan+'_'+scanId.slice(0,8)+'_'+Date.now();
    toss.requestPayment('카드',{
      amount, orderId, orderName,
      successUrl: location.origin+'/boim/pay/success',
      failUrl: location.origin+'/boim/pay/fail',
    });
  }catch(e){ toast('결제창을 열지 못했어요'); }
}

function shareReport(){
  const url=location.href;
  if(navigator.share){ navigator.share({title:'보임 AI 노출 진단', url}).catch(()=>{}); }
  else navigator.clipboard.writeText(url).then(()=>toast('링크가 복사됐어요'));
}

if(location.pathname==='/boim/pay/success'){
  const p=new URLSearchParams(location.search);
  document.querySelector('.wrap').innerHTML=`<div class="logo"><div class="mark">B</div><div class="nm">보임 <b>BOIM</b></div></div>
    <div class="card"><div class="prog"><div class="big"><span class="spin"></span>결제 확인 중</div></div></div>`;
  fetch('/api/boim/pay/confirm',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({paymentKey:p.get('paymentKey'),orderId:p.get('orderId'),amount:Number(p.get('amount'))})})
    .then(x=>x.json()).then(r=>{
      document.querySelector('.card').innerHTML = r.ok
        ? `<div class="grade-wrap"><div class="grade g-A">✓</div></div>
           <div class="verdict">결제 완료! 30일 이용권이 시작됐습니다.<br>리포트 링크로 진행 상황을 알려드릴게요.</div>
           <button class="btn" onclick="location.href='/boim'">홈으로</button>`
        : `<div class="verdict">결제 확인에 실패했어요.<br>${esc(r.error||'')}</div>
           <button class="btn ghost" onclick="location.href='/boim'">돌아가기</button>`;
    });
} else if(location.pathname==='/boim/pay/fail'){
  document.querySelector('.wrap').innerHTML=`<div class="logo"><div class="mark">B</div><div class="nm">보임 <b>BOIM</b></div></div>
    <div class="card"><div class="verdict">결제가 취소되거나 실패했어요.</div>
    <button class="btn ghost" onclick="location.href='/boim'">돌아가기</button></div>`;
}

const m=location.pathname.match(/\/boim\/r\/([a-z0-9]+)/);
if(m){ showProg(); poll(m[1]); }
</script>
</body>
</html>
